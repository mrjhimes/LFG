<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LFG — Location · Flow · Growth</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #e8e1d1;
    --ink-dim:    #9a9282;
    --ink-faint:  #544e43;
    --paper:      #14120e;
    --paper-2:    #1d1a14;
    --card-face:  #f3ecd9;
    --card-back:  #1a1712;
    --accent:     #c9a55c;
    --accent-dim: #8a7340;
    --rule:       rgba(232, 225, 209, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    min-height: 100svh;
    overflow-x: hidden;
  }

  body {
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 165, 92, 0.08), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 110%, rgba(201, 165, 92, 0.05), transparent 60%);
    padding: clamp(1.25rem, 4vw, 3rem);
    padding-top: max(clamp(1.25rem, 4vw, 3rem), env(safe-area-inset-top));
    padding-bottom: max(clamp(1.25rem, 4vw, 3rem), env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
  }

  /* subtle grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.4;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0 0.75 0 0 0 0.25 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    z-index: 1;
  }

  header {
    text-align: center;
    padding: clamp(0.5rem, 2vw, 1.5rem) 0 clamp(1.5rem, 4vw, 2.5rem);
    position: relative;
    z-index: 2;
  }

  .mark {
    font-family: 'Fraunces', serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: var(--ink-dim);
    opacity: 0.45;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-weight: 300;
    font-size: clamp(2rem, 8vw, 3.5rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  h1 .star {
    padding: 0 0.3em;
  }

  h1 em {
    font-style: normal;
    color: #9bad8a;
    font-weight: 600;
  }

  h1 i {
    font-style: italic;
    color: #8a9bb0;
    font-weight: 500;
  }

  h1 b {
    font-style: normal;
    color: #b58470;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .asterism {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    color: #f0e070;
    opacity: 0.15;
    margin-bottom: 0.75rem;
  }

  h1 .star {
    font-size: 0.25em;
    color: #f0e070;
    opacity: 0.3;
    vertical-align: middle;
    font-style: normal;
    font-weight: 300;
  }

  .tagline {
    margin-top: 0.75rem;
    font-size: clamp(0.85rem, 2.2vw, 1rem);
    color: var(--ink-dim);
    font-style: italic;
    font-weight: 300;
  }

  .date {
    margin-top: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    text-transform: uppercase;
    position: relative;
    height: 3rem;
    display: flex;
    align-items: center;
    border: none;
    background-image:
      linear-gradient(to right, transparent, rgba(84, 78, 67, 0.4) 40%, rgba(84, 78, 67, 0.4) 60%, transparent),
      linear-gradient(to right, transparent, rgba(84, 78, 67, 0.4) 40%, rgba(84, 78, 67, 0.4) 60%, transparent);
    background-size: 100% 1px;
    background-position: top, bottom;
    background-repeat: no-repeat;
  }

  #date {
    position: absolute;
    right: calc(50% + 2.5em);
    top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
  }

  #moon-glyph {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    font-size: 1.6rem;
    line-height: 1;
    filter: grayscale(1);
  }

  #moon-label {
    position: absolute;
    left: calc(50% + 2.5em);
    top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
  }

  /* ——— cards ——— */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .spread {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(0.75rem, 2.5vw, 2rem);
    width: 100%;
    max-width: 900px;
    perspective: 2000px;
  }

  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.9rem;
    opacity: 0;
    animation: slotIn 0.9s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .slot:nth-child(1) { animation-delay: 0.1s; }
  .slot:nth-child(2) { animation-delay: 0.25s; }
  .slot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes slotIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slot-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--ink-dim);
    text-transform: uppercase;
    order: -1;
  }

  .slot.flipped .slot-label {
    color: var(--accent);
    transition: color 0.6s 0.3s ease;
  }

  .card {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 3.5;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 1.1s cubic-bezier(.4,.2,.2,1);
    border-radius: 6px;
  }

  .slot:not(.flipped) .card:hover {
    transform: translateY(-4px);
  }

  .slot.flipped .card {
    transform: rotateY(180deg);
  }

  .slot.flipped .card.reversed {
    transform: rotateY(180deg) rotate(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    box-shadow:
      0 1px 0 rgba(232, 225, 209, 0.06) inset,
      0 20px 40px -20px rgba(0,0,0,0.8),
      0 4px 8px -2px rgba(0,0,0,0.5);
  }

  /* back of card */
  .back {
    background:
      radial-gradient(circle at 40% 35%, #111824 0%, #080c12 55%, #050608 100%);
    border: 1px solid var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .back::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201, 165, 92, 0.35);
    border-radius: 3px;
  }

  .back-crest {
    width: 40%;
    aspect-ratio: 1;
    position: relative;
    color: var(--accent);
    opacity: 0.85;
  }

  .back-crest svg {
    width: 100%;
    height: 100%;
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.75; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.04); }
  }

  /* front of card */
  .front {
    transform: rotateY(180deg);
    background: var(--paper);
    color: #2a241a;
    border: none;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  .glyph {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: clamp(2.5rem, 10vw, 4.5rem);
    font-weight: 300;
    color: #4a3d24;
    z-index: 1;
  }

  /* card art fills the full face */
  .card-art {
    position: absolute;
    inset: 0;
    display: flex;
  }
  .card-art img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 0;
    filter: saturate(0.82) sepia(0.08) brightness(0.97);
    transform: scale(1.02);
    -webkit-mask-image: radial-gradient(ellipse 91% 96% at 50% 50%, black 87%, transparent 97%);
    mask-image: radial-gradient(ellipse 91% 96% at 50% 50%, black 87%, transparent 97%);
  }

  /* keyword under the card (shown after flip) */
  .keyword {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    color: var(--ink);
    text-align: center;
    min-height: 1.5em;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.5s 0.7s ease, transform 0.5s 0.7s ease;
    line-height: 1.3;
  }

  .slot.flipped .keyword {
    opacity: 1;
    transform: translateY(0);
  }

  .reversed-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--accent-dim);
    text-transform: uppercase;
    display: block;
    margin-top: 0.75rem;
    opacity: 0;
    transition: opacity 0.4s 1s ease;
  }

  .slot.flipped .reversed-note { opacity: 1; }

  /* ——— footer / controls ——— */
  footer {
    text-align: center;
    padding-top: clamp(1.5rem, 4vw, 3rem);
    position: relative;
    z-index: 2;
  }

  .reshuffle {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 0.9rem 1.8rem;
    cursor: pointer;
    transition: opacity 0.6s ease, border-color 0.3s ease, color 0.3s ease, letter-spacing 0.3s ease;
  }

  .reshuffle:hover, .reshuffle:focus-visible {
    border-color: var(--accent);
    color: var(--accent);
    outline: none;
    letter-spacing: 0.35em;
  }

  .reshuffle:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .reshuffle.hidden {
    opacity: 0;
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }


  /* Larger tap targets and tighter layout on narrow screens */
  @media (max-width: 480px) {
    .spread { gap: 0.6rem; }
    .front { padding: 0.5rem; }
    .front::before { inset: 0.4rem; }
    h1 { font-size: 7vw; }
    .slot-label { font-size: 0.5rem; letter-spacing: 0.15em; }
  }

  /* Accessibility: honor reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.15s !important;
    }
    .card { transition: transform 0.2s ease; }
  }
</style>
</head>
<body>

<header>
  <div class="asterism">⁂</div>
<h1><b>Location</b> <span class="star">✦</span> <i>Flow</i> <span class="star">✦</span> <em>Growth</em></h1>
  <div class="date"><span id="date"></span><span id="moon-glyph"></span><span id="moon-label"></span></div>
</header>

<main>
  <div class="spread" id="spread">
    <!-- three slots injected by JS -->
  </div>
</main>

<footer>
<button class="reshuffle hidden" id="reshuffle" type="button">New Reading</button>
</footer>

<script src="deck.js"></script>
<script>
  // Deck data, areas, and reversal rate live in deck.js.

  // crest SVG used on card backs — abstract three-arc mark echoing L/F/G
  const CREST = `
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="22" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
      <circle cx="30" cy="30" r="14" stroke="currentColor" stroke-width="0.6" opacity="0.7"/>
      <circle cx="30" cy="30" r="2" fill="currentColor"/>
      <path d="M30 8 L32 14 L30 12 L28 14 Z" fill="currentColor" opacity="0.9"/>
      <path d="M52 30 L46 32 L48 30 L46 28 Z" fill="currentColor" opacity="0.9"/>
      <path d="M30 52 L28 46 L30 48 L32 46 Z" fill="currentColor" opacity="0.9"/>
      <path d="M8 30 L14 28 L12 30 L14 32 Z" fill="currentColor" opacity="0.9"/>
    </svg>
  `;

  function drawUnique(n) {
    const shuffled = [...DECK].sort(() => Math.random() - 0.5);
    let picked = shuffled.slice(0, n);

    // Test harness: ?test=fool pins The Fool into a random slot so you don't
    // have to reshuffle 8 times to see the image card in situ.
    // Remove (or gate behind a build flag) once art direction is settled.
    const testCard = new URLSearchParams(location.search).get('test');
    if (testCard) {
      const forced = DECK.find(c => c.name.toLowerCase().includes(testCard.toLowerCase()));
      if (forced) {
        picked = picked.filter(c => c.name !== forced.name);
        const slot = Math.floor(Math.random() * n);
        picked.splice(slot, 0, forced);
        picked = picked.slice(0, n);
      }
    }

    return picked.map(c => ({
      ...c,
      reversed: Math.random() < REVERSAL_RATE,
    }));
  }

  function renderSpread() {
    const spread = document.getElementById('spread');
    const cards = drawUnique(3);
    spread.innerHTML = '';

    AREAS.forEach((area, i) => {
      const c = cards[i];
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.innerHTML = `
        <div class="slot-label">${area.blurb}</div>
        <div class="card${c.reversed ? ' reversed-ready' : ''}" data-reversed="${c.reversed}" role="button" tabindex="0" aria-label="${area.label} card, tap to reveal">
          <div class="face back">
            <div class="back-crest">${CREST}</div>
          </div>
          <div class="face front">
            ${c.img
              ? `<div class="card-art"><img src="${c.img}" alt="${c.name}" loading="lazy"></div>`
              : `<div class="glyph">${c.glyph}</div>`}
          </div>
        </div>
        <div class="keyword">
          ${c.desc || (c.reversed ? c.rev : c.up)}
          ${c.reversed ? '<span class="reversed-note">(Reversed)</span>' : ''}
        </div>
      `;
      spread.appendChild(slot);

      const card = slot.querySelector('.card');
      const flip = () => {
        if (slot.classList.contains('flipped')) return;
        slot.classList.add('flipped');
        if (c.reversed) card.classList.add('reversed');
        checkAllFlipped();
      };
      card.addEventListener('click', flip);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }
      });
    });

  }

  function checkAllFlipped() {
    const slots = document.querySelectorAll('.slot');
    const allFlipped = [...slots].every(s => s.classList.contains('flipped'));
    if (allFlipped) {
      document.getElementById('reshuffle').classList.remove('hidden');
    }
  }

  function setDate() {
    const d = new Date();
    const opts = { year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = d.toLocaleDateString(undefined, opts);
  }

  function setMoon() {
    // Lunar cycle calculation based on known new moon reference (Jan 6 2000 18:14 UTC)
    const REF   = new Date('2000-01-06T18:14:00Z').getTime();
    const CYCLE = 29.53058770576; // synodic month in days
    const now   = Date.now();
    const age   = ((now - REF) / 86400000) % CYCLE; // days into current cycle
    const pct   = age / CYCLE;

    const PHASES = [
      { max: 0.025, label: 'New Moon',        glyph: '🌑' },
      { max: 0.25,  label: 'Waxing Crescent', glyph: '🌒' },
      { max: 0.275, label: 'First Quarter',   glyph: '🌓' },
      { max: 0.50,  label: 'Waxing Gibbous',  glyph: '🌔' },
      { max: 0.525, label: 'Full Moon',        glyph: '🌕' },
      { max: 0.75,  label: 'Waning Gibbous',  glyph: '🌖' },
      { max: 0.775, label: 'Last Quarter',     glyph: '🌗' },
      { max: 0.975, label: 'Waning Crescent', glyph: '🌘' },
      { max: 1,     label: 'New Moon',        glyph: '🌑' },
    ];

    const phase = PHASES.find(p => pct < p.max);
    document.getElementById('moon-glyph').textContent = phase.glyph;
    document.getElementById('moon-label').textContent = phase.label;
  }

  document.getElementById('reshuffle').addEventListener('click', () => {
    const btn = document.getElementById('reshuffle');
    btn.disabled = true;
    // fade out slots, then redraw
    document.querySelectorAll('.slot').forEach((s, i) => {
      s.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      s.style.opacity = '0';
      s.style.transform = 'translateY(-10px)';
    });
    setTimeout(() => {
      renderSpread();
      btn.disabled = false;
      btn.classList.add('hidden');
    }, 450);
  });

  setDate();
  setMoon();
  renderSpread();
</script>

<script>
  // Livereload: polls the local dev server for file changes and reloads.
  // Silently no-ops if the /__mtime endpoint isn't present (i.e. deployed).
  (async function livereload() {
    let last;
    try {
      const r = await fetch('/__mtime', { cache: 'no-store' });
      if (!r.ok) return;
      last = await r.text();
    } catch { return; }
    while (true) {
      await new Promise(r => setTimeout(r, 800));
      try {
        const r = await fetch('/__mtime', { cache: 'no-store' });
        if (!r.ok) continue;
        const now = await r.text();
        if (now !== last) location.reload();
      } catch {}
    }
  })();
</script>

</body>
</html>
